version: '3.8'

services:
  api:
    build: .
    container_name: comicmanager_api
    ports:
      - "7877:7877"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: my-secret-pw
      DB_NAME: ComicManagerAPIDB
      LOG_PATH: /app/logs
    volumes:
      - logs-volume:/app/logs
    depends_on:
      - db
  
  db:
    image: mysql:latest
    container_name: comicmanager_db
    ports:
      - "7787:3306"
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
      MYSQL_DATABASE: ComicManagerAPIDB
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  logs-volume: